{% extends 'base.html' %}

{% block content %}
<style>
    .date-filter-box {
        background: white;
        margin: 15px;
        padding: 15px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        cursor: pointer;
    }
    
    .date-display {
        font-size: 0.95rem;
        color: var(--text-dark);
        flex: 1;
    }

    /* Bottom Sheet Modal */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 2000;
        display: none;
        opacity: 0;
        transition: opacity 0.3s;
    }
    
    .bottom-sheet {
        position: fixed;
        bottom: -100%;
        left: 0; right: 0;
        background: white;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        z-index: 2001;
        transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        padding-bottom: 20px;
    }
    
    .sheet-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        border-bottom: 1px solid var(--border-color);
        font-size: 1rem;
    }
    
    .sheet-header .cancel { color: var(--text-muted); cursor: pointer; }
    .sheet-header .title { font-weight: bold; }
    .sheet-header .confirm { color: var(--primary-red); cursor: pointer; }

    /* Picker Rollers */
    .picker-container {
        display: flex;
        height: 200px;
        position: relative;
        overflow: hidden;
    }
    
    .picker-column {
        flex: 1;
        height: 100%;
        overflow-y: auto;
        scroll-snap-type: y mandatory;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE */
        padding: 80px 0; /* padding to allow first/last items to center */
    }
    .picker-column::-webkit-scrollbar { display: none; }
    
    .picker-item {
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        scroll-snap-align: center;
        font-size: 1.1rem;
        color: var(--text-muted);
        transition: color 0.2s, font-size 0.2s;
    }
    
    /* Selection highlight overlay */
    .picker-highlight {
        position: absolute;
        top: 80px;
        left: 0;
        right: 0;
        height: 40px;
        border-top: 1px solid var(--border-color);
        border-bottom: 1px solid var(--border-color);
        pointer-events: none;
    }

</style>

<div class="header-basic">
    <a href="{% url 'agency' %}" class="back-btn"><i class="fas fa-chevron-left"></i></a>
    Commission Details
</div>

<div class="date-filter-box" onclick="openPicker()">
    <div class="date-display" id="currentDate">2026-04-18</div>
    <i class="fas fa-chevron-down" style="color: var(--text-muted);"></i>
</div>

<!-- Modal -->
<div class="modal-overlay" id="overlay" onclick="closePicker()"></div>
<div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-header">
        <div class="cancel" onclick="closePicker()">Cancel</div>
        <div class="title">Choose a date</div>
        <div class="confirm" onclick="confirmDate()">Confirm</div>
    </div>
    <div class="picker-container">
        <div class="picker-highlight"></div>
        <div class="picker-column" id="colYear" onscroll="handleScroll(this)"></div>
        <div class="picker-column" id="colMonth" onscroll="handleScroll(this)"></div>
        <div class="picker-column" id="colDay" onscroll="handleScroll(this)"></div>
    </div>
</div>

<script>
    const overlay = document.getElementById('overlay');
    const sheet = document.getElementById('bottomSheet');
    const display = document.getElementById('currentDate');
    
    const colYear = document.getElementById('colYear');
    const colMonth = document.getElementById('colMonth');
    const colDay = document.getElementById('colDay');
    
    function populateColumn(el, start, end, pad=false) {
        let html = '';
        for(let i=start; i<=end; i++) {
            let val = pad && i < 10 ? '0'+i : i;
            html += `<div class="picker-item" data-val="${val}">${val}</div>`;
        }
        el.innerHTML = html;
        updateHighlight(el);
    }

    const today = new Date();
    const curYear = today.getFullYear();
    const curMonth = today.getMonth() + 1;
    const curDay = today.getDate();

    if(!display.innerText.includes('-') || display.innerText === '2026-04-18') {
        display.innerText = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(curDay).padStart(2,'0')}`;
    }

    populateColumn(colYear, 2020, curYear + 5);
    populateColumn(colMonth, 1, 12, true);

    function updateDays() {
        let y = parseInt(getSelected(colYear) || curYear);
        let m = parseInt(getSelected(colMonth) || curMonth);
        let daysInMonth = new Date(y, m, 0).getDate();
        let prevDay = getSelected(colDay);
        
        populateColumn(colDay, 1, daysInMonth, true);
        
        if(prevDay) {
            let d = Math.min(parseInt(prevDay), daysInMonth);
            scrollToVal(colDay, String(d).padStart(2, '0'));
        }
    }

    updateDays();

    function openPicker() {
        overlay.style.display = 'block';
        setTimeout(() => {
            overlay.style.opacity = '1';
            sheet.style.bottom = '0';
        }, 10);
        
        let parts = display.innerText !== 'Choose a date' && display.innerText.includes('-') ? 
                    display.innerText.split('-') : 
                    [String(curYear), String(curMonth).padStart(2,'0'), String(curDay).padStart(2,'0')];
                    
        scrollToVal(colYear, parts[0]);
        scrollToVal(colMonth, parts[1]);
        updateDays();
        scrollToVal(colDay, parts[2]);
    }

    function closePicker() {
        sheet.style.bottom = '-100%';
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; }, 300);
    }
    
    function scrollToVal(column, val) {
        let items = column.querySelectorAll('.picker-item');
        for(let i=0; i<items.length; i++) {
            if(items[i].dataset.val == val) {
                column.scrollTop = i * 40;
                break;
            }
        }
        updateHighlight(column);
    }

    function updateHighlight(column) {
        let centerIndex = Math.round(column.scrollTop / 40);
        let items = column.querySelectorAll('.picker-item');
        
        items.forEach((item, idx) => {
            item.style.color = (idx === centerIndex) ? 'var(--text-dark)' : 'var(--text-muted)';
            item.style.fontWeight = (idx === centerIndex) ? 'bold' : 'normal';
        });
    }

    function handleScroll(column) {
        updateHighlight(column);
        if(column.id === 'colYear' || column.id === 'colMonth') {
            updateDays();
        }
    }

    function getSelected(column) {
        let centerIndex = Math.round(column.scrollTop / 40);
        let items = column.querySelectorAll('.picker-item');
        if(items[centerIndex]) return items[centerIndex].dataset.val;
        return "";
    }

    function confirmDate() {
        let y = getSelected(colYear);
        let m = getSelected(colMonth);
        let d = getSelected(colDay);
        if(y && m && d) {
            display.innerText = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }
        closePicker();
    }
</script>

{% endblock %}
