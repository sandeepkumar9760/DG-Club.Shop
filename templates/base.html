<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DG Club Simulator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f6f7fa;
            --white: #ffffff;
            --text-dark: #333333;
            --text-muted: #8e95a5;
            --primary-red: #ff5e62;
            --primary-gradient: linear-gradient(135deg, #ff9999 0%, #ff5e62 100%);
            --border-color: #f0f0f0;
            --accent-green: #34d399;
            --accent-violet: #8b5cf6;
            --accent-yellow: #fbbf24;
            --safe-yellow: #fef3c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 70px; /* Space for bottom nav */
            overflow-x: hidden;
        }

        .top-gradient-bg {
            background: var(--primary-gradient);
            padding: 20px 20px 40px 20px;
            color: white;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            position: relative;
        }

        .header-basic {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: var(--white);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .header-basic .back-btn {
            margin-right: 15px;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 1.2rem;
        }

        .card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            position: relative;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--white);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            width: 20%;
        }

        .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--primary-red);
        }

        /* Center Spin Button over Nav */
        .nav-center {
            position: relative;
            top: -20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--primary-red);
            font-size: 0.7rem;
            width: 20%;
        }
        
        .nav-center .spin-btn {
            background: var(--primary-gradient);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(255, 94, 98, 0.4);
            margin-bottom: 2px;
            border: 3px solid white;
        }

        /* Utility */
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary { background: var(--primary-gradient); color: white; }
        .btn-block { width: 100%; display: block; }
        
        input[type="number"], input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}

    {% if user.is_authenticated %}
    <div class="bottom-nav">
        <a href="{% url 'home' %}" class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-ticket-alt"></i>
            <span>Activity</span>
        </a>
        <a href="#" class="nav-center">
            <div class="spin-btn">
                <i class="fas fa-bullseye"></i>
            </div>
            <span>Get ₹300</span>
        </a>
        <a href="{% url 'agency' %}" class="nav-item {% if request.resolver_match.url_name == 'agency' %}active{% endif %}">
            <i class="fas fa-briefcase"></i>
            <span>Promotion</span>
        </a>
        <a href="{% url 'account' %}" class="nav-item {% if request.resolver_match.url_name == 'account' %}active{% endif %}">
            <i class="fas fa-user"></i>
            <span>Account</span>
        </a>
    </div>
    {% endif %}
</body>
</html>
